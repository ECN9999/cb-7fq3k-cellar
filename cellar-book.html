<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- Standalone web-app: added to the iPhone home screen, this opens fullscreen
     (no Safari address bar, no browser chrome). Requires this file to be served
     as the top-level page (self-hosted), not wrapped inside claude.ai. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cellar Book">
<meta name="theme-color" content="#171013">
<link rel="manifest" href='data:application/manifest+json,{"name":"The Cellar Book","short_name":"Cellar Book","display":"standalone","background_color":"%23171013","theme_color":"%23171013"}'>
<!-- iOS ignores data-URI touch icons — this must be a real file beside this page -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>Cellar Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171013; --card:#231721; --card-hi:#2B1C28;
    --ink:#EFE6D9; --muted:#A08C92; --faint:#7D6B72; --line:#3A2733;
    --love:#B03A4A; --love-deep:#8E2A3C;
    --avoid:#59626E; --gold:#C9A45C;
    --c-red:#A13646; --c-white:#D6C783; --c-rose:#D98B9B; --c-orange:#C77B3F;
    --c-sparkling:#9FB4C7; --c-dessert:#C9A45C; --c-fortified:#8A5A3B; --c-other:#7D6B72;
    --serif:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans)}
  body{min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.35}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

  /* ---------- header ---------- */
  header{padding:10px 12px 6px}
  .masthead{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  h1{font-family:var(--serif);font-weight:600;font-size:18px;letter-spacing:.01em}
  h1 em{font-style:italic;color:var(--gold);font-weight:400}
  .counts{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--muted);white-space:nowrap}
  .counts b{color:var(--ink);font-weight:600}
  .banner{margin-top:6px;font-size:12px;color:var(--gold);display:none}
  .banner.err{color:#D98B7A}
  .banner.show{display:block}
  .btnrow{display:flex;gap:8px;margin-top:9px}
  .btn{flex:1;border-radius:10px;padding:9px 8px;font-size:13.5px;font-weight:600;border:1px solid var(--line)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#211505}
  .btn.gold:disabled{background:var(--card);border-color:var(--line);color:var(--muted);cursor:default}
  .toast{font-size:12px;color:var(--gold);min-height:15px;margin-top:5px;text-align:center}
  .toast.err{color:#D98B7A}
  .controls{display:flex;gap:7px;margin-top:8px}
  .search{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font:inherit;font-size:13.5px;padding:8px 11px;outline:none}
  .search::placeholder{color:var(--faint)}
  .search:focus{border-color:var(--gold)}
  .fbtn{position:relative;flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-size:13px;padding:8px 11px;display:flex;align-items:center;gap:5px}
  .fbtn.open{border-color:var(--gold)}
  .fbtn .arr{color:var(--gold);font-size:11px}
  .fbtn .dotb{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;
    background:var(--gold);color:#211505;font-size:10.5px;font-weight:700;display:none;
    align-items:center;justify-content:center;padding:0 4px}
  .fbtn .dotb.show{display:flex}
  .chips{display:flex;gap:5px;margin-top:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);
    border-radius:999px;padding:5px 10px;font-size:12.5px;display:flex;align-items:center;gap:5px}
  .chip.on{background:var(--card-hi);color:var(--ink);border-color:var(--gold)}
  .chip .cd{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .chip .n{font-size:11px;color:var(--faint)}
  .chip.on .n{color:var(--gold)}

  /* ---------- inline sort & filter panel ---------- */
  .panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:4px 12px 12px;margin-top:8px}
  .panel.open{display:block}
  .phead{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 0}
  .phead h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:15.5px;color:var(--ink)}
  .reset{color:var(--gold);font-size:12.5px;padding:4px 0}
  .slabel{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:11px 0 6px}
  .srow{display:flex;flex-wrap:wrap;gap:5px}
  .done{width:100%;margin-top:13px;border-radius:10px;padding:9px;font-size:13.5px;font-weight:600;
    background:var(--gold);color:#211505;border:1px solid var(--gold)}

  /* ---------- list ---------- */
  main{flex:1;padding:2px 12px 34px}
  .sortline{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);
    margin:4px 2px 6px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:8px 9px 8px 13px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;
    align-items:center;gap:3px 9px;transition:border-color .18s;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:background .18s}
  .card.up{border-color:rgba(176,58,74,.6)}
  .card.up::before{background:var(--love)}
  .card.down{opacity:.7}
  .card.down::before{background:var(--avoid)}
  .cinfo{min-width:0;grid-column:1}
  .wname{font-family:var(--serif);font-size:15px;font-weight:600;line-height:1.2;
    display:flex;align-items:baseline;gap:7px}
  .wname .cd{width:8px;height:8px;border-radius:50%;flex:0 0 auto;transform:translateY(-1px);
    box-shadow:0 0 0 1px rgba(0,0,0,.35) inset}
  .m1{color:var(--ink);opacity:.85;font-size:12px;margin-top:3px}
  .m2{color:var(--muted);font-size:11.5px;margin-top:1px}
  .m3{color:var(--faint);font-size:11px;margin-top:3px;letter-spacing:.02em}
  .m1 span+span::before,.m2 span+span::before,.m3 span+span::before{content:" · "}
  .note{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:11.5px;margin-top:3px}
  .tag{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-top:3px;display:inline-block}
  .thumbcol{grid-column:2;display:flex;flex-direction:row;gap:7px;align-items:center}
  .tbtn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg);
    color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:transform .12s,border-color .15s,background .15s,color .15s}
  .tbtn:active{transform:scale(.9)}
  .tbtn.up.sel{background:var(--love-deep);border-color:var(--love);color:#fff}
  .tbtn.down.sel{background:#39414C;border-color:var(--avoid);color:#DDE3EA}
  .empty{color:var(--muted);text-align:center;padding:38px 20px;font-family:var(--serif);font-style:italic;font-size:15px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  /* Fullscreen (home-screen) mode: keep content clear of the notch and home indicator */
  @supports (padding: env(safe-area-inset-top)) {
    header{padding-top:calc(10px + env(safe-area-inset-top));
      padding-left:calc(12px + env(safe-area-inset-left));
      padding-right:calc(12px + env(safe-area-inset-right))}
    main{padding-bottom:calc(34px + env(safe-area-inset-bottom));
      padding-left:calc(12px + env(safe-area-inset-left));
      padding-right:calc(12px + env(safe-area-inset-right))}
  }
</style>
</head>
<body>

<header>
  <div class="masthead">
    <h1>The <em>Cellar Book</em></h1>
    <div class="counts" id="counts"></div>
  </div>
  <div class="banner" id="banner"></div>
  <div class="btnrow">
    <button class="btn gold" id="copyBtn">Copy ratings for Claude</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="controls">
    <input class="search" id="search" type="search" placeholder="Search wine, grape, region…">
    <button class="fbtn" id="filterBtn">Sort &amp; filter <span class="arr">&#9662;</span><span class="dotb" id="fbadge"></span></button>
  </div>
  <div class="chips" id="colourChips"></div>
  <div class="panel" id="panel">
    <div class="phead"><h2>Sort &amp; filter</h2><button class="reset" id="resetBtn">Reset all</button></div>
    <div class="slabel">Sort by</div><div class="srow" id="rowSort"></div>
    <div class="slabel">Verdict</div><div class="srow" id="rowVerdict"></div>
    <div class="slabel">World</div><div class="srow" id="rowWorld"></div>
    <div class="slabel">Country</div><div class="srow" id="rowCountry"></div>
    <button class="done" id="doneBtn">Done</button>
  </div>
</header>

<main id="list"></main>

<script>
(function(){
"use strict";
/* ============================================================================
   Fully self-contained Cellar Book. The wine log is embedded below (LOG_RAW) —
   no Drive, no API, works offline. Ratings are saved on this device. To get
   changes back into the master log: tap "Copy ratings for Claude" and paste
   the block into a Claude chat; when the log changes, Claude rebuilds this
   file with the fresh log and the device ratings reconcile automatically.
   ========================================================================== */
const RATE_KEY="wine-rater-ratings", PROBE_KEY="wine-rater-probe";
const LOG_AS_OF="2026-07-05";
const LOG_RAW="# Ed's Wine Log  \nUpdated: 2026-07-05\n  \n## Taste profile  \n- **Loves:** (pending verdicts — bootstrap batch all rated 4)  \n- **Likes:** Sangiovese (Chianti + Australian), Barolo, Barbaresco, Chardonnay, Pinot Noir, Soave, Chablis (stated); batch of 15 bottles all \"very good\" (4) spanning high-acid Italian reds, lean/precise whites, Jura, Retsina  \n- **Dislikes:** none recorded yet  \n- **Structure:** early evidence points to high acid, savoury over fruity, medium body; tolerates firm tannin (Nebbiolo); oak not a driver (Chablis + Soave + Chenin + Albariño all lean) — unconfirmed  \n- **Adventurousness:** seeks the weird — Jura Chardonnay, Retsina, Pecorino, Roussillon blends all self-chosen and enjoyed  \n- **Price comfort:** finds recent bottles \"a bit expensive\"; actively wants cheaper wines with similar profiles (Langhe Nebbiolo over Barolo, Rosso di Montalcino / Chianti Rufina over Chianti Classico, Mâcon / regional Aussie Chardonnay, Gavi / Verdicchio as Soave alternatives)  \n- **Open questions:** Are the two big Aussie magnums (Yarra Yering, Rockford) occasion wines or a genuine plush-red streak? Does he prefer oaked or unoaked Chardonnay? Try: Etna Rosso, Xinomavro, Valpolicella Classico (high-acid savoury reds); Assyrtiko (given Retsina + Albariño).  \n  \n## Conventions  \n- **Prices:** figures marked ≈ are approximate current AUD retail, researched online 2026-07-05 — not what Ed paid. When Ed gives a paid/list price, record it and keep the retail figure alongside (e.g. \"$95 list / ≈$40 retail\") — the gap is the value judgement.  \n- **Styles:** each style entry carries body (light/medium/full) and savoury vs fruity, so the rater can show it per bottle.  \n  \n## Wine log  \n| Date | Wine (producer, name, vintage) | Region | Grape(s) | Style | Where | Price | Verdict | Notes |  \n|---|---|---|---|---|---|---|---|---|  \n|  | Summerfield Tradition 2015 | Pyrenees, VIC | Shiraz, Cab Sauv, Merlot, Cab Franc | full-bodied plush fruity red | home (bootstrap photo) | ≈$35 | 4 | bootstrap batch — \"very good, a bit expensive\" |  \n|  | Le Roc des Anges \"Llum\" 2022 | Roussillon, France | white blend | textured dry white, medium body, savoury, 12.5% | restaurant (bootstrap photo) | ≈$77 | 4 | bootstrap batch |  \n|  | Domaine Overnoy Chardonnay Vieilles Vignes | Côtes du Jura (Sud Revermont), France | Chardonnay | mineral savoury white, light–medium body | restaurant (bootstrap photo, same as Llum) | ≈$80 | 4 | bootstrap batch |  \n|  | Yarra Yering Dry Red Wine No. 1 2013 | Yarra Valley, VIC | Cabernet blend | full-bodied structured red, savoury edge | home (bootstrap photo) — magnum | ≈$400 magnum (≈$170/750ml) | 👍 | bootstrap batch |  \n|  | Rockford Basket Press Shiraz 1997 | Barossa Valley, SA | Shiraz | full-bodied rich fruity red, aged | home (bootstrap photo, same night as YY No.1) — magnum | ≈$600 magnum (≈$300/750ml) | 👍 | bootstrap batch |  \n|  | Umani Ronchi \"I Sassi\" Pecorino | Terre di Chieti, Abruzzo, Italy | Pecorino | crisp herbal white, light–medium body, savoury | restaurant (bootstrap photo) | ≈$34 | 👍 | bootstrap batch |  \n|  | Rod Easthope Pinot Noir 2023 | Central Otago, NZ | Pinot Noir | medium-bodied red, dark-fruited | restaurant (bootstrap photo) | ≈$40 | 👍 | bootstrap batch |  \n|  | Château Meillac 2016 | Bordeaux Supérieur, France | Merlot-led blend | medium–full dry red, savoury-fruity | restaurant (bootstrap photo) | ≈$28 | 4 | bootstrap batch |  \n|  | Sentiō Chardonnay 2024 | Beechworth, VIC | Chardonnay | modern lean Chardonnay, light–medium body, savoury | home (bootstrap photo) | ≈$52 | 4 | bootstrap batch |  \n|  | Domaine Guiberteau Saumur Blanc 2023 | Saumur, Loire, France | Chenin Blanc | dry mineral white, medium body, savoury, 12.5% | restaurant/bar (bootstrap photo) | ≈$80 | 4 | bootstrap batch |  \n|  | Charquiño Albariño | Rías Baixas, Spain | Albariño | zesty saline white, light-bodied, savoury | bootstrap photo (outdoors) | ≈$28 | 4 | bootstrap batch |  \n|  | Anduma \"Il Fiume\" Barbaresco | Barbaresco, Piedmont, Italy | Nebbiolo | perfumed firm red, medium–full body, savoury | restaurant (bootstrap photo) — vintage not visible | ≈$60 | 👍 | bootstrap batch |  \n|  | Gilbert Sangiovese 2024 | Mudgee, NSW | Sangiovese | mid-weight savoury red | bootstrap photo | ≈$35 | 4 | bootstrap batch |  \n|  | Malamatina Retsina | Greece | Savatiano (resinated) | dry piney white, light-bodied, savoury (resin) | Greek restaurant (bootstrap photo) | ≈$12 (500ml) | 👎 | bootstrap batch |  \n|  | Indigo Sangiovese 2024 | Beechworth, VIC | Sangiovese | mid-weight savoury red | bar/restaurant (bootstrap photo) | ≈$32 | 4 | bootstrap batch |  \n  \nNote: photo EXIF (dates/GPS) was stripped on upload, so tasting dates could not be recovered from the bootstrap photos — dates and venues pending from Ed. Update rows in place when he supplies them.";

let log=null;      // {raw, wines:[...]}
let ratings={};    // id -> "up"|"down"|"neutral" (deviations from the embedded log only)
let f={colour:"all",verdict:"all",world:"all",country:"all"};
let sort="latest", query="";

const $=id=>document.getElementById(id);
const todayStr=()=>{const d=new Date(),p=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());};

/* ============================== storage ==============================
   Layered: Claude artifact storage (inside the Claude app) → localStorage
   (self-hosted / home-screen standalone) → in-memory (last resort, warned). */
const memObj={};
const BACKENDS=[
  { name:"claude",
    avail:()=> typeof window.storage!=="undefined"&&window.storage&&typeof window.storage.get==="function",
    probe:async()=>{await window.storage.set(PROBE_KEY,JSON.stringify(todayStr()));},
    get:async k=>{try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}catch(e){return null;}},
    set:async(k,v)=>{await window.storage.set(k,JSON.stringify(v));} },
  { name:"local",
    avail:()=>{try{return typeof window.localStorage!=="undefined"&&!!window.localStorage;}catch(e){return false;}},
    probe:async()=>{window.localStorage.setItem(PROBE_KEY,todayStr());},
    get:async k=>{try{const v=window.localStorage.getItem(k);return v==null?null:JSON.parse(v);}catch(e){return null;}},
    set:async(k,v)=>{window.localStorage.setItem(k,JSON.stringify(v));} },
  { name:"mem",
    avail:()=>true, probe:async()=>{},
    get:async k=>memObj[k]!==undefined?memObj[k]:null,
    set:async(k,v)=>{memObj[k]=v;} }
];
let store=BACKENDS[2];
async function pickStore(){
  for(const b of BACKENDS){
    if(!b.avail()) continue;
    try{await b.probe();return b;}catch(e){console.error("store probe",b.name,e);}
  }
  return BACKENDS[2];
}
async function loadStored(key){try{return await store.get(key);}catch(e){return null;}}
async function saveStored(key,val){
  try{await store.set(key,val);}
  catch(e){console.error("storage",e);
    toast("Couldn't save that tap \u2014 it may not survive closing; use Copy ratings before you leave",true);}
}

/* ============================== parsing ============================== */
function norm(s){return (s||"").toLowerCase().replace(/\s+/g," ").trim();}
function thumbOf(v){
  v=(v||"").trim();
  if(v.indexOf("\u{1F44D}")>=0||v==="5") return "up";
  if(v.indexOf("\u{1F44E}")>=0||v==="1"||v==="2") return "down";
  return "neutral";
}

/* ---- derived facets (computed from existing columns; no schema change) ---- */
const COLOURS=[["red","Red"],["white","White"],["rose","Ros\u00e9"],["orange","Orange"],["sparkling","Sparkling"],["dessert","Dessert"],["fortified","Fortified"],["other","Other"]];
const RED_GRAPES=["shiraz","syrah","cabernet","cab sauv","cab franc","merlot","pinot noir","nebbiolo","sangiovese","grenache","garnacha","tempranillo","malbec","zinfandel","primitivo","barbera","dolcetto","gamay","mourv","mataro","montepulciano","aglianico","nero d","xinomavro","touriga","corvina","menc\u00eda","mencia","carignan","cinsault","petit verdot","durif","tannat","blaufr","zweigelt","saperavi","pinotage","frappato","lagrein","teroldego","red blend","cabernet blend","merlot-led"];
const WHITE_GRAPES=["chardonnay","riesling","sauvignon","chenin","albari","pecorino","savatiano","gr\u00fcner","gruner","pinot gris","pinot grigio","gew\u00fcrz","gewurz","viognier","marsanne","roussanne","s\u00e9millon","semillon","verdicchio","garganega","fiano","greco","vermentino","assyrtiko","melon","muscadet","cortese","arneis","trebbiano","furmint","torront","manseng","verdejo","godello","moschofilero","malagousia","muscat blanc","white blend","blanc"];
function colourOf(w){
  const s=norm(w.style), g=norm(w.grape), all=s+" "+g;
  if(/fortified|\bport\b|sherry|madeira|marsala|rutherglen|topaque|vin doux|oloroso|amontillado|\bfino\b|tawny/.test(all)) return "fortified";
  if(/sparkling|champagne|prosecco|\bcava\b|cr[e\u00e9]mant|p[e\u00e9]t.?nat|franciacorta|lambrusco|bubbles|m[e\u00e9]thode|spumante/.test(all)) return "sparkling";
  if(/dessert|sweet wine|sticky|sauternes|tokaji|late harvest|botrytis|ice ?wine|eiswein|passito|vin santo|moelleux|auslese|straw wine|\bpx\b/.test(all)) return "dessert";
  if(/orange wine|skin.?contact|amber wine|ramato|orange/.test(s)) return "orange";
  if(/ros[e\u00e9]|rosado|rosato/.test(all)) return "rose";
  if(/\bred\b|rosso|rouge|tinto/.test(s)) return "red";
  if(/\bwhite\b|blanc\b|bianco/.test(s)) return "white";
  for(let i=0;i<RED_GRAPES.length;i++) if(g.indexOf(RED_GRAPES[i])>=0) return "red";
  for(let i=0;i<WHITE_GRAPES.length;i++) if(g.indexOf(WHITE_GRAPES[i])>=0) return "white";
  return "other";
}
const AU_STATES={vic:1,sa:1,nsw:1,wa:1,tas:1,qld:1,act:1,nt:1,victoria:1,"south australia":1,"new south wales":1,"western australia":1,tasmania:1,queensland:1};
const COUNTRY_MAP={france:"France",italy:"Italy",spain:"Spain",portugal:"Portugal",germany:"Germany",austria:"Austria",greece:"Greece",hungary:"Hungary",georgia:"Georgia",croatia:"Croatia",slovenia:"Slovenia",switzerland:"Switzerland",england:"England",uk:"England",lebanon:"Lebanon",australia:"Australia",nz:"New Zealand","new zealand":"New Zealand",usa:"USA","united states":"USA",california:"USA",oregon:"USA",washington:"USA",argentina:"Argentina",chile:"Chile","south africa":"South Africa",canada:"Canada",uruguay:"Uruguay",japan:"Japan"};
const OLD_WORLD={France:1,Italy:1,Spain:1,Portugal:1,Germany:1,Austria:1,Greece:1,Hungary:1,Georgia:1,Croatia:1,Slovenia:1,Switzerland:1,England:1,Lebanon:1};
function countryOf(w){
  const parts=(w.region||"").split(",");
  for(let i=parts.length-1;i>=0;i--){
    const p=norm(parts[i]).replace(/[()]/g,"").trim();
    if(AU_STATES[p]) return "Australia";
    if(COUNTRY_MAP[p]) return COUNTRY_MAP[p];
  }
  return "";
}
function priceNumOf(w){
  const m=(w.price||"").replace(/,/g,"").match(/(\d+(\.\d+)?)/);
  return m?parseFloat(m[1]):null;
}
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function dateMsOf(w){
  const t=(w.date||"").trim(); if(!t) return null;
  let m=t.match(/(\d{4})-(\d{1,2})(?:-(\d{1,2}))?/);
  if(m) return new Date(+m[1],+m[2]-1,+(m[3]||1)).getTime();
  m=t.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);           // AU d/m/y
  if(m){let y=+m[3];if(y<100)y+=2000;return new Date(y,+m[2]-1,+m[1]).getTime();}
  const p=Date.parse(t); return isNaN(p)?null:p;
}
function fmtDate(w){
  if(w.dateMs!==null){const d=new Date(w.dateMs);return d.getDate()+" "+MONTHS[d.getMonth()]+" '"+String(d.getFullYear()).slice(2);}
  return (w.date||"").trim();
}

function parseLog(raw){
  const lines=raw.split("\n"), wines=[];
  let inTable=false;
  for(let i=0;i<lines.length;i++){
    const L=lines[i], t=L.trim();
    if(!inTable && /^\|\s*date\s*\|/i.test(t)){inTable=true;i++;continue;}
    if(inTable){
      if(t.startsWith("|")){
        const c=L.split("|");
        if(c.length>=10){
          const w={lineIdx:i,date:c[1].trim(),name:c[2].trim(),region:c[3].trim(),grape:c[4].trim(),
            style:c[5].trim(),where:c[6].trim(),price:c[7].trim(),verdictRaw:c[8].trim(),notes:c[9].trim()};
          if(w.name){
            w.id=norm(w.date+"|"+w.name);
            w.fileThumb=thumbOf(w.verdictRaw);
            w.colour=colourOf(w);
            w.country=countryOf(w);
            w.world=w.country?(OLD_WORLD[w.country]?"old":"new"):"";
            w.priceNum=priceNumOf(w);
            w.dateMs=dateMsOf(w);
            wines.push(w);
          }
        }
      } else if(t!==""){inTable=false;}
    }
  }
  return {raw,wines};
}

/* ============================== rating logic ============================== */
function effThumb(w){return ratings[w.id]!==undefined?ratings[w.id]:w.fileThumb;}
async function tap(w,dir){
  const cur=effThumb(w);
  const next=(cur===dir)?"neutral":dir;
  if(next===w.fileThumb) delete ratings[w.id]; else ratings[w.id]=next;
  await saveStored(RATE_KEY,ratings);
  render();
}
const changedCount=()=>Object.keys(ratings).filter(id=>log&&log.wines.some(w=>w.id===id)).length;

/* ============================== filtering & sorting ============================== */
const SORTS=[["latest","Latest first"],["oldest","Oldest first"],["price-hi","Price: high \u2192 low"],["price-lo","Price: low \u2192 high"],["az","A \u2192 Z"]];
const VERDICTS=[["all","All"],["up","\u{1F44D}"],["neutral","\u2013"],["down","\u{1F44E}"],["changed","Changed"]];
const WORLDS=[["all","All"],["old","Old World"],["new","New World"]];

function passes(w){
  if(f.colour!=="all"&&w.colour!==f.colour) return false;
  const t=effThumb(w);
  if(f.verdict==="changed"&&ratings[w.id]===undefined) return false;
  if((f.verdict==="up"||f.verdict==="down"||f.verdict==="neutral")&&t!==f.verdict) return false;
  if(f.world!=="all"&&w.world!==f.world) return false;
  if(f.country!=="all"&&w.country!==f.country) return false;
  const q=norm(query);
  if(q && norm(w.name+" "+w.region+" "+w.grape+" "+w.style+" "+w.notes).indexOf(q)<0) return false;
  return true;
}
function sorted(arr){
  const a=arr.slice();
  const newer=(x,y)=>y.lineIdx-x.lineIdx;    // rows are appended, so later row = more recent
  if(sort==="latest") a.sort((x,y)=>{
    if(x.dateMs!==null&&y.dateMs!==null&&x.dateMs!==y.dateMs) return y.dateMs-x.dateMs;
    if(x.dateMs!==null&&y.dateMs===null) return -1;
    if(y.dateMs!==null&&x.dateMs===null) return 1;
    return newer(x,y);
  });
  else if(sort==="oldest") a.sort((x,y)=>{
    if(x.dateMs!==null&&y.dateMs!==null&&x.dateMs!==y.dateMs) return x.dateMs-y.dateMs;
    if(x.dateMs!==null&&y.dateMs===null) return -1;
    if(y.dateMs!==null&&x.dateMs===null) return 1;
    return x.lineIdx-y.lineIdx;
  });
  else if(sort==="price-hi") a.sort((x,y)=>{
    if(x.priceNum!==null&&y.priceNum!==null&&x.priceNum!==y.priceNum) return y.priceNum-x.priceNum;
    if(x.priceNum!==null&&y.priceNum===null) return -1;
    if(y.priceNum!==null&&x.priceNum===null) return 1;
    return newer(x,y);
  });
  else if(sort==="price-lo") a.sort((x,y)=>{
    if(x.priceNum!==null&&y.priceNum!==null&&x.priceNum!==y.priceNum) return x.priceNum-y.priceNum;
    if(x.priceNum!==null&&y.priceNum===null) return -1;
    if(y.priceNum!==null&&x.priceNum===null) return 1;
    return newer(x,y);
  });
  else if(sort==="az") a.sort((x,y)=>x.name.localeCompare(y.name));
  return a;
}
const activeFilterCount=()=>["verdict","world","country"].filter(k=>f[k]!=="all").length;

/* ============================== render ============================== */
function colourVar(c){return "var(--c-"+c+")";}
function whereShort(s){return (s||"").replace(/\([^)]*\)/g,"").replace(/\s{2,}/g," ").replace(/\s+\u2014\s*$/,"").trim();}

function chipBtn(label,on,onClick,dotColour,count){
  const b=document.createElement("button");
  b.className="chip"+(on?" on":"");
  if(dotColour){const d=document.createElement("span");d.className="cd";d.style.background=dotColour;b.appendChild(d);}
  b.appendChild(document.createTextNode(label));
  if(count!==undefined){const n=document.createElement("span");n.className="n";n.textContent=count;b.appendChild(n);}
  b.onclick=onClick;
  return b;
}

function render(){
  if(!log) return;
  /* header counts (whole cellar, not the filtered view) */
  let u=0,n=0,dn=0;
  for(const w of log.wines){const t=effThumb(w);if(t==="up")u++;else if(t==="down")dn++;else n++;}
  $("counts").innerHTML="<b>"+u+"</b> \u{1F44D}\u2002<b>"+n+"</b> \u2013\u2002<b>"+dn+"</b> \u{1F44E}";

  /* colour chips (only colours that exist in the log) */
  const cc=$("colourChips");cc.innerHTML="";
  const colCounts={};for(const w of log.wines) colCounts[w.colour]=(colCounts[w.colour]||0)+1;
  cc.appendChild(chipBtn("All",f.colour==="all",()=>{f.colour="all";render();},null,log.wines.length));
  for(const [key,label] of COLOURS){
    if(!colCounts[key]) continue;
    cc.appendChild(chipBtn(label,f.colour===key,()=>{f.colour=key;render();},colourVar(key),colCounts[key]));
  }

  /* filter badge */
  const bd=$("fbadge"),ac=activeFilterCount();
  bd.textContent=ac;bd.className="dotb"+(ac?" show":"");

  /* panel rows */
  const rs=$("rowSort");rs.innerHTML="";
  for(const [key,label] of SORTS) rs.appendChild(chipBtn(label,sort===key,()=>{sort=key;render();}));
  const rv=$("rowVerdict");rv.innerHTML="";
  for(const [key,label] of VERDICTS){
    const lab=(key==="changed"&&changedCount())?label+" ("+changedCount()+")":label;
    rv.appendChild(chipBtn(lab,f.verdict===key,()=>{f.verdict=key;render();}));
  }
  const rw=$("rowWorld");rw.innerHTML="";
  for(const [key,label] of WORLDS) rw.appendChild(chipBtn(label,f.world===key,()=>{f.world=key;render();}));
  const rc=$("rowCountry");rc.innerHTML="";
  const ctryCounts={};for(const w of log.wines) if(w.country) ctryCounts[w.country]=(ctryCounts[w.country]||0)+1;
  rc.appendChild(chipBtn("All",f.country==="all",()=>{f.country="all";render();}));
  for(const c of Object.keys(ctryCounts).sort())
    rc.appendChild(chipBtn(c,f.country===c,()=>{f.country=c;render();},null,ctryCounts[c]));

  /* list */
  const list=$("list");list.innerHTML="";
  const shown=sorted(log.wines.filter(passes));
  const sl=document.createElement("div");sl.className="sortline";
  const sortLabel=SORTS.filter(s=>s[0]===sort)[0][1];
  sl.textContent=shown.length+" wine"+(shown.length===1?"":"s")+" \u00b7 "+sortLabel+" \u00b7 log as of "+LOG_AS_OF;
  list.appendChild(sl);
  if(!shown.length){const e=document.createElement("div");e.className="empty";
    e.textContent=(log.wines.length&&(ac||f.colour!=="all"||query))?"Nothing matches \u2014 loosen the filters.":"Nothing here \u2014 pour something new.";
    list.appendChild(e);}
  for(const w of shown){
    const t=effThumb(w);
    const card=document.createElement("div");card.className="card"+(t==="up"?" up":t==="down"?" down":"");
    const info=document.createElement("div");info.className="cinfo";

    const nm=document.createElement("div");nm.className="wname";
    const d=document.createElement("span");d.className="cd";d.style.background=colourVar(w.colour);nm.appendChild(d);
    const nt=document.createElement("span");nt.textContent=w.name;nm.appendChild(nt);
    info.appendChild(nm);

    /* one compact line: region · grape */
    const m1=document.createElement("div");m1.className="m1";let hasM1=false;
    for(const v of [w.region,w.grape]){ if(v){const s=document.createElement("span");s.textContent=v;m1.appendChild(s);hasM1=true;} }
    if(hasM1) info.appendChild(m1);
    if(w.style){const m2=document.createElement("div");m2.className="m2";const s=document.createElement("span");s.textContent=w.style;m2.appendChild(s);info.appendChild(m2);}
    const m3=document.createElement("div");m3.className="m3";let hasM3=false;
    for(const v of [whereShort(w.where),w.price,fmtDate(w)]){ if(v){const s=document.createElement("span");s.textContent=v;m3.appendChild(s);hasM3=true;} }
    if(hasM3) info.appendChild(m3);
    if(w.notes&&norm(w.notes)!=="bootstrap batch"){const no=document.createElement("div");no.className="note";no.textContent=w.notes;info.appendChild(no);}
    if(w.verdictRaw==="?"&&ratings[w.id]===undefined){const p=document.createElement("span");p.className="tag";p.textContent="verdict pending";info.appendChild(p);}
    else if(ratings[w.id]!==undefined){const p=document.createElement("span");p.className="tag";p.textContent="changed \u2014 copy to Claude";info.appendChild(p);}
    card.appendChild(info);

    const th=document.createElement("div");th.className="thumbcol";
    const up=document.createElement("button");up.className="tbtn up"+(t==="up"?" sel":"");up.textContent="\u{1F44D}";up.setAttribute("aria-label","Thumbs up "+w.name);up.onclick=()=>tap(w,"up");
    const dwn=document.createElement("button");dwn.className="tbtn down"+(t==="down"?" sel":"");dwn.textContent="\u{1F44E}";dwn.setAttribute("aria-label","Thumbs down "+w.name);dwn.onclick=()=>tap(w,"down");
    th.appendChild(up);th.appendChild(dwn);card.appendChild(th);
    list.appendChild(card);
  }

  /* action button */
  const c=changedCount();
  $("copyBtn").textContent=c?"Copy ratings for Claude ("+c+")":"Copy ratings for Claude";
}
function banner(msg,err){const b=$("banner");b.textContent=msg||"";b.className="banner"+(msg?" show":"")+(err?" err":"");}
function toast(msg,err){const t=$("toast");t.textContent=msg||"";t.className="toast"+(err?" err":"");}

/* ============================== inline panel ============================== */
function togglePanel(force){
  const p=$("panel"),open=(force!==undefined)?force:!p.classList.contains("open");
  p.className="panel"+(open?" open":"");
  $("filterBtn").className="fbtn"+(open?" open":"");
}
$("filterBtn").onclick=()=>togglePanel();
$("doneBtn").onclick=()=>togglePanel(false);
$("resetBtn").onclick=()=>{f={colour:"all",verdict:"all",world:"all",country:"all"};sort="latest";query="";$("search").value="";render();};

/* ============================== actions ============================== */
$("search").addEventListener("input",e=>{query=e.target.value;render();});
$("copyBtn").onclick=()=>{
  if(!log) return;
  const sym={up:"\u{1F44D}",down:"\u{1F44E}",neutral:"\u2013"};
  const lines=["WINE RATINGS "+todayStr()];
  for(const w of log.wines){ if(ratings[w.id]!==undefined) lines.push(sym[ratings[w.id]]+" "+w.name); }
  if(lines.length===1){toast("No changed ratings to copy");return;}
  const ta=document.createElement("textarea");ta.value=lines.join("\n");ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();
  let ok=false;try{ok=document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
  toast(ok?"Copied \u2014 paste it into a Claude chat to update the log":"Couldn't copy \u2014 long-press to select instead",!ok);
};

/* ============================== init ============================== */
(async function init(){
  store=await pickStore();
  ratings=(await loadStored(RATE_KEY))||{};
  log=parseLog(LOG_RAW);
  /* reconcile: drop local ratings the embedded log has already absorbed */
  let pruned=false;
  for(const w of log.wines){ if(ratings[w.id]!==undefined&&ratings[w.id]===w.fileThumb){delete ratings[w.id];pruned=true;} }
  if(pruned) await saveStored(RATE_KEY,ratings);
  if(store.name==="mem")
    banner("Ratings can't be saved in this browser (private browsing?) \u2014 they'll vanish when you close. Copy ratings before leaving.",true);
  render();
})();
})();
</script>
</body>
